name: README build

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */1 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Upgraded to v6 (Migrated to Node 24 runtime, security & performance improvements)
      - name: Checkout current repository
        uses: actions/checkout@v6

      # 2. Upgraded to v4 (Supports latest Node versions and handles caching natively)
      # Changed Node from 13.x (End-of-Life) to 20.x (Current LTS)
      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm' # Native dependency caching replaces the separate actions/cache@v1 step

      - name: Install dependencies
        run: npm ci # 'npm ci' is preferred for CI environments over 'npm install'

      - name: Generate README file
        run: node index.js

      # 3. Replaced the deprecated third-party action with standard Git commands
      - name: Commit and Push new README.md
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: automatically update README.md"
            git push origin main
          else
            echo "No changes to commit"
          fi
